<!doctype html>
<meta charset="utf-8">
<title>Ontogenesis — Module Graph</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; }
  header { padding: 12px 16px; border-bottom: 1px solid #ddd; }
  #chart { width: 100vw; height: calc(100vh - 56px); }
  .node circle { stroke: #333; stroke-width: 1px; }
  .node text { font-size: 12px; pointer-events: none; }
  .link { stroke: #999; stroke-opacity: 0.6; }
</style>
<header>
  <b>Ontogenesis — Module Graph</b>
  <span style="margin-left:8px;color:#666">Loads <code>catalog/registry.jsonld</code> and shows module nodes.</span>
</header>
<svg id="chart"></svg>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
  const width = window.innerWidth;
  const height = window.innerHeight - 56;
  const svg = d3.select("#chart").attr("width", width).attr("height", height);

  fetch("../catalog/registry.jsonld")
    .then(r => r.json())
    .then(reg => {
      const mods = (reg.modules || []).map(m => ({ id: m.id, label: (m.id||"").split("#").pop(), layer: m.layer, path: m.path }));
      const nodes = mods;
      const links = []; // add imports later by parsing TTL if desired

      const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(90))
        .force("charge", d3.forceManyBody().strength(-280))
        .force("center", d3.forceCenter(width/2, height/2));

      const link = svg.append("g").selectAll("line")
        .data(links)
        .join("line")
        .attr("class","link");

      const node = svg.append("g").selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class","node")
        .call(d3.drag()
          .on("start", (event,d) => { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
          .on("drag", (event,d) => { d.fx=event.x; d.fy=event.y; })
          .on("end", (event,d) => { if (!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
        );

      node.append("circle").attr("r", 10);
      node.append("text").attr("x", 14).attr("y", 4).text(d => d.label);

      node.append("title").text(d => `${d.label}\n${d.layer}\n${d.path}`);

      sim.on("tick", () => {
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);

        node.attr("transform", d => `translate(${d.x},${d.y})`);
      });
    });
</script>
