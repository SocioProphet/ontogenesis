name: validate

on:
  push:
  pull_request:

jobs:
  ontology-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup venv and install deps
        run: make venv deps
      - name: Validate
        run: make validate
