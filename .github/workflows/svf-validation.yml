name: SVF Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ontogenesis-svf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create virtualenv
        run: make venv
      - name: Install dependencies
        run: make deps
      - name: Validate Ontogenesis SVF contracts
        run: make svf
