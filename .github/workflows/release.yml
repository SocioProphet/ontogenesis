name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build dist + ledger + verify
        run: |
          python scripts/build_dist.py
          python scripts/ledger_build.py
          python scripts/ledger_verify.py

      - name: Sign dist (detached Ed25519)
        run: |
          python scripts/sign_dist.py

      - name: Emit SPDX SBOM
        run: python scripts/spdx_emit.py

      - name: Pack release
        run: |
          tar -czf ontogenesis-${GITHUB_REF_NAME}.tar.gz dist ledger signatures sbom catalog imports docs

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ontogenesis-${{ github.ref_name }}.tar.gz
